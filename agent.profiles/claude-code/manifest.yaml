name: claude-code
description: Anthropic Claude Code CLI
env: [ANTHROPIC_API_KEY]
files:
  - src: settings/settings.json
    dst: /home/{{user}}/.claude/settings.json
instructions_dst: /home/{{user}}/.claude/CLAUDE.md
# Persistent volume — survives `rp destroy && rp create` so `claude login`
# writes (~/.claude/.credentials.json, session state, indexes) are
# preserved. The volume mount shadows the in-image /home/{{user}}/.claude
# at runtime, so build-project-image.sh routes the `files:` + the
# composed instructions_dst into /usr/local/share/rp/seed/claude-home/
# instead; rp-init.sh copies them into the mounted volume on first
# launch (volume is empty on first create). See ADR-0014.
volumes:
  - name: claude-home
    mount: .claude
# host_files + host_keychain intentionally NOT declared at the profile
# level. Host imports are opt-in per workspace via .rp/config.yaml
# (see .rp.example/config.yaml for the menu of recommended candidates).
# Rationale: nothing should cross the host boundary by default; the
# user has to enumerate exactly which files they want carried over.
entrypoints:
  install: install.sh
  run: run.sh
  run_gated: run-gated.sh
  login: login.sh
